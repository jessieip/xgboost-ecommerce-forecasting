name: Daily XGBoost Training

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            ./.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Prepare Google credentials file
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          CREDENTIALS_FILE="$RUNNER_TEMP/gcp-service-account.json"
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$CREDENTIALS_FILE"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_FILE" >> "$GITHUB_ENV"

      - name: Run daily XGBoost training
        run: poetry run python -m src.main

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-outputs
          path: outputs/**
          if-no-files-found: warn

      - name: Clean up Google credentials file
        if: always()
        run: rm -f "$RUNNER_TEMP/gcp-service-account.json"
